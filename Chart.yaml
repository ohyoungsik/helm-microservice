apiVersion: v2
name: msa-platform
description: index + market + post
type: application
version: 0.1.0
appVersion: "1.0.0"

# 의존하는 dependency chart 목록
dependencies:
  - name: index-app
    version: 0.1.0
    repository: "file://chart/index"
    condition: index-app.enabled

  - name: market-app
    version: 0.1.0
    repository: "file://chart/market"
    condition: market-app.enabled

  - name: post-app
    version: 0.1.0
    repository: "file://chart/post"
    condition: post-app.enabled